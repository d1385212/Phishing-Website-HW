<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作業三：前端排版與互動練習</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>監理服務網</h1>
            <p class="warning-text">交通違規(含強制險)查詢及繳納</p>
        </header>

        <div class="progress-bar">
            <div class="step active">步驟一：查詢資料</div>
            <div class="step">步驟二：勾選明細</div>
            <div class="step">步驟三：完成繳費</div>
        </div>

        <div id="step1-area">
            <form id="queryForm" class="query-form">
                <div class="form-group">
                    <label for="idNumber">身分證字號：</label>
                    <input type="text" id="idNumber" placeholder="請輸入身分證字號" required>
                </div>
                <div class="form-group">
                    <label for="dob">出生年月日：</label>
                    <input type="date" id="dob" required>
                </div>
                <div class="form-group mock-captcha-group">
                    <label for="captcha">驗證碼：</label>
                    <div class="captcha-wrapper">
                        <input type="text" id="captcha" placeholder="輸入右側文字" required>
                        <div class="mock-captcha">A2EL</div>
                    </div>
                </div>
                <div class="button-group">
                    <button type="submit" class="submit-btn">查詢</button>
                </div>
            </form>
        </div>

        <div id="step2-area" class="hidden">
            <p class="user-greeting">
                <span id="user-info-display" style="color: #0056b3; font-weight: bold;"></span>，違規紀錄如下：
            </p>

            <div class="tabs-container">
                <div class="tab active">可線上繳納</div>
                <div class="tab inactive">不可線上繳納</div>
            </div>

            <div class="table-container">
                <p class="table-desc">下列罰單可做線上繳納：</p>
                <div class="record-grid">
                    <div class="grid-header">勾選</div>
                    <div class="grid-header">違規日</div>
                    <div class="grid-header">事由</div>
                    <div class="grid-header">罰鍰</div>
                    <div class="grid-header">應到案日</div>

                    <div class="grid-cell"><input type="checkbox" class="ticket-cb" value="1800"></div>
                    <div class="grid-cell">112/05/12</div>
                    <div class="grid-cell text-left">駕車行經有燈光號誌管制之交岔路口闖紅燈</div>
                    <div class="grid-cell price-text">1800</div>
                    <div class="grid-cell">112/06/25</div>

                    <div class="grid-cell"><input type="checkbox" class="ticket-cb" value="600"></div>
                    <div class="grid-cell">112/08/03</div>
                    <div class="grid-cell text-left">在設有禁止停車標誌、標線之處所停車</div>
                    <div class="grid-cell price-text">600</div>
                    <div class="grid-cell">112/09/15</div>
                </div>
                <div class="total-area">
                    目前選取總額：<span id="total-amount">0</span> 元
                </div>
            </div>

            <div class="step-actions">
                <button id="go-step3-btn" class="pay-btn" disabled>線上繳費</button>
                <a href="#" id="back-to-step1" class="back-link">«回上一步</a>
            </div>
        </div>

        <div id="step3-area" class="hidden">
            <h2 class="section-title">信用卡繳費</h2>
            <p class="payment-summary">應繳總額：<span id="final-amount" class="price-text">0</span> 元</p>
            
            <div class="query-form">
                <div class="form-group">
                    <label>信用卡號：</label>
                    <div class="cc-inputs">
                        <input type="text" maxlength="4" class="cc-part"> - 
                        <input type="text" maxlength="4" class="cc-part"> - 
                        <input type="text" maxlength="4" class="cc-part"> - 
                        <input type="text" maxlength="4" class="cc-part">
                    </div>
                </div>
                <div class="form-group">
                    <label>有效年月：</label>
                    <input type="text" placeholder="MM/YY" maxlength="5">
                </div>
                <div class="form-group">
                    <label>安全碼：</label>
                    <input type="text" placeholder="背面末三碼" maxlength="3" style="width: 120px;">
                </div>
            </div>

            <div class="step-actions">
                <button id="confirm-pay-btn" class="submit-btn">確認扣款</button>
                <a href="#" id="back-to-step2" class="back-link">«回上一步</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
